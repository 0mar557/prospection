<body class="h-full bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100">
	<!-- Page de Setup (Premier accès) -->
	<div id="setupContainer" class="flex min-h-screen items-center justify-center bg-gradient-to-br from-purple-500 to-indigo-600 px-4 hidden">

	<!-- Page de Login -->

	<!-- App Principale (cachée au démarrage) -->

		<section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
			<div class="mb-4 flex items-center justify-between">

			</div>

			<div class="overflow-x-auto rounded-xl border border-slate-200 dark:border-slate-800">

							<th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600 dark:text-slate-300">Entreprise</th>
							<th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600 dark:text-slate-300">Téléphone</th>
							<th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600 dark:text-slate-300">Compteurs</th>
							<th class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wider text-slate-600 dark:text-slate-300">Action</th>

	<!-- Modale Zoom -->
	<div id="companyModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/70 p-4">
		<div class="w-full max-w-2xl rounded-2xl border border-slate-200 bg-white p-5 shadow-glow dark:border-slate-700 dark:bg-slate-900">

				<div class="grid gap-1 sm:grid-cols-[120px_1fr]">

					<dd><a id="modalSite" class="text-indigo-600 underline decoration-indigo-300 underline-offset-2 hover:text-indigo-500 dark:text-indigo-400"></a></dd>
				</div>
				<div class="grid gap-1 sm:grid-cols-[120px_1fr]">
					<dt class="font-semibold text-slate-600 dark:text-slate-400">Email</dt>
					<dd><a id="modalEmail" class="text-indigo-600 underline decoration-indigo-300 underline-offset-2 hover:text-indigo-500 dark:text-indigo-400"></a></dd>
				</div>
				<div class="grid gap-1 sm:grid-cols-[120px_1fr]">
					<dt class="font-semibold text-slate-600 dark:text-slate-400">Téléphone</dt>
					<dd id="modalPhone"></dd>
				</div>
			</dl>

			<div class="mt-4 grid gap-3 sm:grid-cols-2">
				<label class="flex items-center gap-2 rounded-lg border border-slate-200 p-3 dark:border-slate-700">
					<input id="calledCheck" type="checkbox" class="h-4 w-4 rounded border-slate-400 text-indigo-600 focus:ring-indigo-500" />

					placeholder="Saisir un compte-rendu d'appel, objections, prochaine relance..."></textarea>
			</div>

			<div class="mt-5 flex flex-wrap items-center justify-end gap-3">
				<button id="saveCloseBtn" type="button"
					class="rounded-xl bg-emerald-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 dark:focus:ring-offset-slate-900">

	<script>
		// ===== AUTHENTIFICATION (SÉCURISÉE AVEC SETUP) =====
		const AUTH_KEY = 'callweb.auth.v1';
		const CREDENTIALS_HASH_KEY = 'callweb.credentials.hash.v1';

		const setupContainerEl = document.getElementById('setupContainer');
		const setupFormEl = document.getElementById('setupForm');
		const setupUsernameEl = document.getElementById('setupUsername');
		const setupPasswordEl = document.getElementById('setupPassword');
		const setupMessageEl = document.getElementById('setupMessage');

		const loginContainerEl = document.getElementById('loginContainer');
		const appContainerEl = document.getElementById('appContainer');
		const loginFormEl = document.getElementById('loginForm');
		const loginUsernameEl = document.getElementById('loginUsername');
		const loginPasswordEl = document.getElementById('loginPassword');
		const loginErrorEl = document.getElementById('loginError');

		// Fonction de hash sécurisée utilisant la Web Crypto API
		async function hashCredentials(username, password) {
			const credentials = `${username}:${password}`;
			const encoder = new TextEncoder();
			const data = encoder.encode(credentials);
			const hashBuffer = await crypto.subtle.digest('SHA-256', data);
			const hashArray = Array.from(new Uint8Array(hashBuffer));
			const hashHex = hashArray.map((b) => b.toString(16).padStart(2, '0')).join('');
			return hashHex;
		}

		async function handleSetup(e) {
			e.preventDefault();
			const username = setupUsernameEl.value.trim();
			const password = setupPasswordEl.value;

			if (!username || !password) {
				setupMessageEl.textContent = 'Remplissez tous les champs.';
				setupMessageEl.className = 'rounded-lg bg-rose-500/20 px-3 py-2 text-sm text-rose-200';
				setupMessageEl.classList.remove('hidden');
				return;
			}

			try {
				const hash = await hashCredentials(username, password);
				localStorage.setItem(CREDENTIALS_HASH_KEY, hash);
				setupMessageEl.textContent = 'Configuration reussie! Redirection...';
				setupMessageEl.className = 'rounded-lg bg-emerald-500/20 px-3 py-2 text-sm text-emerald-200';
				setupMessageEl.classList.remove('hidden');

				setTimeout(() => {
					setupUsernameEl.value = '';
					setupPasswordEl.value = '';
					checkAuthStatus();
				}, 800);
			} catch (error) {
				console.error('Erreur configuration:', error);
				setupMessageEl.textContent = 'Erreur lors de la configuration. Reessayez.';
				setupMessageEl.className = 'rounded-lg bg-rose-500/20 px-3 py-2 text-sm text-rose-200';
				setupMessageEl.classList.remove('hidden');
			}
		}

		function checkAuthStatus() {
			const credentialsHash = localStorage.getItem(CREDENTIALS_HASH_KEY);
			const isAuthenticated = localStorage.getItem(AUTH_KEY) === 'true';

			if (!credentialsHash) {
				showSetup();
			} else if (isAuthenticated) {
				showApp();
			} else {
				showLogin();
			}
		}

		function showSetup() {
			setupContainerEl.classList.remove('hidden');
			loginContainerEl.classList.add('hidden');
			appContainerEl.classList.add('hidden');
		}

		function showLogin() {
			setupContainerEl.classList.add('hidden');
			loginContainerEl.classList.remove('hidden');
			appContainerEl.classList.add('hidden');
		}

		function showApp() {
			setupContainerEl.classList.add('hidden');
			loginContainerEl.classList.add('hidden');
			appContainerEl.classList.remove('hidden');
			initApp();
		}

		async function handleLogin(e) {
			e.preventDefault();
			const username = loginUsernameEl.value.trim();
			const password = loginPasswordEl.value;
			const storedHash = localStorage.getItem(CREDENTIALS_HASH_KEY);

			if (!storedHash) {
				loginErrorEl.textContent = 'Configuration non completee. Actualisez la page.';
				loginErrorEl.classList.remove('hidden');
				return;
			}

			try {
				const hash = await hashCredentials(username, password);
				if (hash === storedHash) {
					localStorage.setItem(AUTH_KEY, 'true');
					loginErrorEl.classList.add('hidden');
					loginUsernameEl.value = '';
					loginPasswordEl.value = '';
					showApp();
				} else {
					loginErrorEl.textContent = 'Identifiant ou mot de passe incorrect.';
					loginErrorEl.classList.remove('hidden');
					loginPasswordEl.value = '';
				}
			} catch (error) {
				console.error('Erreur authentification:', error);
				loginErrorEl.textContent = 'Erreur lors de la verification. Reessayez.';
				loginErrorEl.classList.remove('hidden');
			}
		}

		function handleLogout() {
			localStorage.removeItem(AUTH_KEY);
			showLogin();
		}

		setupFormEl.addEventListener('submit', handleSetup);
		loginFormEl.addEventListener('submit', handleLogin);

		// ===== APPLICATION PRINCIPALE =====
		// IMPORTANT (sécurité/config) : créez la table "prospects" avec les colonnes : id, nom, site, email, tel, calls, mails, notes.
		const SUPABASE_URL = 'https://kexdjgcbjwbweftvmocs.supabase.co';
		const SUPABASE_ANON_KEY = 'sb_publishable_-L0IYmCxFmFm-EP_umcsmg_Awk5dtmV';
		const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

		let companies = [];
		let selectedCompanyId = null;

		let importDataEl, importBtnEl, clearAllBtnEl, logoutBtnEl, importFeedbackEl, tableBodyEl, globalStatsEl;
		let modalEl, closeModalBtnEl, saveCloseBtnEl, modalTitleEl, modalCountersEl;
		let modalSiteEl, modalEmailEl, modalPhoneEl, calledCheckEl, emailedCheckEl, modalNotesEl;

		function initApp() {
			importDataEl = document.getElementById('importData');
			importBtnEl = document.getElementById('importBtn');
			clearAllBtnEl = document.getElementById('clearAllBtn');
			logoutBtnEl = document.getElementById('logoutBtn');
			importFeedbackEl = document.getElementById('importFeedback');
			tableBodyEl = document.getElementById('companiesTableBody');
			globalStatsEl = document.getElementById('globalStats');

			modalEl = document.getElementById('companyModal');
			closeModalBtnEl = document.getElementById('closeModalBtn');
			saveCloseBtnEl = document.getElementById('saveCloseBtn');
			modalTitleEl = document.getElementById('modalTitle');
			modalCountersEl = document.getElementById('modalCounters');
			modalSiteEl = document.getElementById('modalSite');
			modalEmailEl = document.getElementById('modalEmail');
			modalPhoneEl = document.getElementById('modalPhone');
			calledCheckEl = document.getElementById('calledCheck');
			emailedCheckEl = document.getElementById('emailedCheck');
			modalNotesEl = document.getElementById('modalNotes');

			importBtnEl.addEventListener('click', handleImport);
			clearAllBtnEl.addEventListener('click', clearAll);
			closeModalBtnEl.addEventListener('click', closeModal);
			saveCloseBtnEl.addEventListener('click', saveAndClose);
			logoutBtnEl.addEventListener('click', handleLogout);

			tableBodyEl.addEventListener('click', (event) => {
				const target = event.target;
				if (!(target instanceof HTMLElement)) return;
				const id = target.dataset.id;
				if (!id) return;

				if (target.classList.contains('open-modal')) {
					openModal(id);
					return;
				}

				if (target.classList.contains('delete-row')) {
					deleteProspectById(id);
				}
			});

			modalEl.addEventListener('click', (event) => {
				if (event.target === modalEl) {
					closeModal();
				}
			});

			loadProspects();
		}

		function sanitizeUrl(url) {
			const trimmed = String(url || '').trim();
			if (!trimmed) return '#';
			if (/^https?:\/\//i.test(trimmed)) return trimmed;
			return `https://${trimmed}`;
		}

		function escapeHtml(value) {
			return String(value)
				.replaceAll('&', '&amp;')
				.replaceAll('<', '&lt;')
				.replaceAll('>', '&gt;')
				.replaceAll('"', '&quot;')
				.replaceAll("'", '&#039;');
		}

		function renderStats() {
			const totals = companies.reduce(
				(acc, c) => {
					acc.calls += Number(c.calls || 0);
					acc.mails += Number(c.mails || 0);
					return acc;
				},
				{ calls: 0, mails: 0 }
			);
			globalStatsEl.textContent = `${companies.length} entreprise(s) • Appels ${totals.calls} • Emails ${totals.mails}`;
		}

		function renderTable() {
			tableBodyEl.innerHTML = '';

			if (companies.length === 0) {
				const tr = document.createElement('tr');
				tr.innerHTML = `
					<td colspan="4" class="px-4 py-8 text-center text-sm text-slate-500 dark:text-slate-400">
						Aucune entreprise. Importez des données pour démarrer.
					</td>
				`;
				tableBodyEl.appendChild(tr);
				renderStats();
				return;
			}

			companies.forEach((company) => {
				const isHot = Number(company.calls || 0) > 3;
				const tr = document.createElement('tr');
				tr.className = isHot ? 'bg-amber-50/80 dark:bg-amber-900/10' : 'bg-white dark:bg-slate-900';

				tr.innerHTML = `
					<td class="px-4 py-3 text-sm font-medium">${escapeHtml(company.nom)}</td>
					<td class="px-4 py-3 text-sm">${escapeHtml(company.tel)}</td>
					<td class="px-4 py-3 text-sm">
						<span class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-semibold ${
							isHot
								? 'bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300'
								: 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300'
						}">
							Appels ${Number(company.calls || 0)} / Emails ${Number(company.mails || 0)}
						</span>
					</td>
					<td class="px-4 py-3 text-right text-sm">
						<div class="flex justify-end gap-2">
							<button type="button" data-id="${company.id}"
								class="open-modal rounded-lg bg-indigo-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-indigo-500">
								Ouvrir
							</button>
							<button type="button" data-id="${company.id}"
								class="delete-row rounded-lg bg-rose-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-rose-500">
								Supprimer
							</button>
						</div>
					</td>
				`;
				tableBodyEl.appendChild(tr);
			});

			renderStats();
		}

		function parseImportLines(text) {
			const lines = String(text || '').split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
			const validEntries = [];
			const errors = [];

			lines.forEach((line, index) => {
				const parts = line.split(';').map((part) => part.trim());
				if (parts.length !== 4 || parts.some((part) => part.length === 0)) {
					errors.push({ lineNumber: index + 1, raw: line });
					return;
				}

				const [nom, site, email, tel] = parts;
				validEntries.push({ nom, site, email, tel, calls: 0, mails: 0, notes: '' });
			});

			return { validEntries, errors, totalLines: lines.length };
		}

		async function loadProspects() {
			const { data, error } = await supabaseClient
				.from('prospects')
				.select('id, nom, site, email, tel, calls, mails, notes')
				.order('id', { ascending: true });

			if (error) {
				console.error('Erreur loadProspects:', error);
				importFeedbackEl.textContent = `Erreur de chargement Supabase : ${error.message}`;
				importFeedbackEl.className = 'text-sm text-rose-600 dark:text-rose-400';
				companies = [];
				renderTable();
				return;
			}

			companies = Array.isArray(data) ? data : [];
			renderTable();
		}

		function openModal(companyId) {
			const company = companies.find((c) => String(c.id) === String(companyId));
			if (!company) return;

			selectedCompanyId = companyId;
			modalTitleEl.textContent = company.nom;
			modalCountersEl.textContent = `Appels : ${Number(company.calls || 0)} • Emails : ${Number(company.mails || 0)}`;

			modalSiteEl.href = sanitizeUrl(company.site);
			modalSiteEl.target = '_blank';
			modalSiteEl.rel = 'noopener noreferrer';
			modalSiteEl.textContent = company.site || '-';

			modalEmailEl.href = `mailto:${company.email || ''}`;
			modalEmailEl.textContent = company.email || '-';

			modalPhoneEl.textContent = company.tel || '-';
			modalNotesEl.value = company.notes || '';

			calledCheckEl.checked = false;
			emailedCheckEl.checked = false;

			modalEl.classList.remove('hidden');
			modalEl.classList.add('flex');
		}

		function closeModal() {
			modalEl.classList.add('hidden');
			modalEl.classList.remove('flex');
			selectedCompanyId = null;
			calledCheckEl.checked = false;
			emailedCheckEl.checked = false;
		}

		async function saveAndClose() {
			if (!selectedCompanyId) {
				closeModal();
				return;
			}

			const company = companies.find((c) => String(c.id) === String(selectedCompanyId));
			if (!company) {
				closeModal();
				return;
			}

			const nextCalls = Number(company.calls || 0) + (calledCheckEl.checked ? 1 : 0);
			const nextMails = Number(company.mails || 0) + (emailedCheckEl.checked ? 1 : 0);
			const nextNotes = modalNotesEl.value.trim();

			const payload = {
				id: company.id,
				nom: company.nom,
				site: company.site,
				email: company.email,
				tel: company.tel,
				calls: nextCalls,
				mails: nextMails,
				notes: nextNotes
			};

			const { error } = await supabaseClient.from('prospects').upsert(payload);
			if (error) {
				console.error('Erreur upsert:', error);
				importFeedbackEl.textContent = `Erreur d'enregistrement : ${error.message}`;
				importFeedbackEl.className = 'text-sm text-rose-600 dark:text-rose-400';
				return;
			}

			calledCheckEl.checked = false;
			emailedCheckEl.checked = false;
			closeModal();
			await loadProspects();
		}

		async function handleImport() {
			const text = importDataEl.value;
			const { validEntries, errors, totalLines } = parseImportLines(text);

			if (totalLines === 0) {
				importFeedbackEl.textContent = 'Aucune ligne détectée.';
				importFeedbackEl.className = 'text-sm text-amber-600 dark:text-amber-400';
				return;
			}

			let insertedCount = 0;
			const dbErrors = [];

			for (const row of validEntries) {
				const { error } = await supabaseClient.from('prospects').insert(row);
				if (error) {
					dbErrors.push(error.message);
				} else {
					insertedCount += 1;
				}
			}

			if (errors.length > 0 || dbErrors.length > 0) {
				const formatPreview = errors.slice(0, 2).map((e) => `L${e.lineNumber}: ${e.raw}`).join(' | ');
				const dbPreview = dbErrors.slice(0, 1).join('');
				importFeedbackEl.textContent = `Import partiel : ${insertedCount} insérée(s), ${errors.length} erreur(s) format, ${dbErrors.length} erreur(s) DB. ${formatPreview} ${dbPreview}`;
				importFeedbackEl.className = 'text-sm text-amber-600 dark:text-amber-400';
			} else {
				importFeedbackEl.textContent = `Import réussi : ${insertedCount} entreprise(s) ajoutée(s).`;
				importFeedbackEl.className = 'text-sm text-emerald-600 dark:text-emerald-400';
			}

			importDataEl.value = '';
			await loadProspects();
		}

		async function deleteProspectById(id) {
			const confirmed = window.confirm('Supprimer cette entreprise ?');
			if (!confirmed) return;

			const { error } = await supabaseClient.from('prospects').delete().eq('id', id);
			if (error) {
				console.error('Erreur suppression:', error);
				importFeedbackEl.textContent = `Erreur suppression : ${error.message}`;
				importFeedbackEl.className = 'text-sm text-rose-600 dark:text-rose-400';
				return;
			}

			importFeedbackEl.textContent = 'Entreprise supprimée.';
			importFeedbackEl.className = 'text-sm text-rose-600 dark:text-rose-400';
			await loadProspects();
		}

		async function clearAll() {
			const confirmed = window.confirm('Supprimer toutes les entreprises et statistiques en base ?');
			if (!confirmed) return;

			const { data: ids, error: idsError } = await supabaseClient.from('prospects').select('id');
			if (idsError) {
				importFeedbackEl.textContent = `Erreur lecture IDs : ${idsError.message}`;
				importFeedbackEl.className = 'text-sm text-rose-600 dark:text-rose-400';
				return;
			}

			if (!ids || ids.length === 0) {
				importFeedbackEl.textContent = 'Aucune donnée à supprimer.';
				importFeedbackEl.className = 'text-sm text-amber-600 dark:text-amber-400';
				await loadProspects();
				return;
			}

			const idList = ids.map((row) => row.id);
			const { error } = await supabaseClient.from('prospects').delete().in('id', idList);
			if (error) {
				importFeedbackEl.textContent = `Erreur suppression globale : ${error.message}`;
				importFeedbackEl.className = 'text-sm text-rose-600 dark:text-rose-400';
				return;
			}

			importFeedbackEl.textContent = 'Toutes les données ont été supprimées de Supabase.';
			importFeedbackEl.className = 'text-sm text-rose-600 dark:text-rose-400';
			await loadProspects();
		}

		// Vérification du statut d'authentification au chargement
		checkAuthStatus();
	</script>
</body>
</html>
